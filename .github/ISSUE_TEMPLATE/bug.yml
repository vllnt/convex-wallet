name: Bug Report
description: Report a bug in @vllnt/convex-wallet
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal Reproduction
      description: Code or steps to reproduce the issue.
      render: typescript
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package Version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: convex-version
    attributes:
      label: Convex Version
      placeholder: "1.36.1"
    validations:
      required: true
